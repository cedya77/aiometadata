name: Stale Awaiting Author

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 28
          days-before-close: 7
          stale-pr-label: stale-awaiting-author
          exempt-pr-labels: pinned, security, work-in-progress
          only-pr-labels: awaiting-author
          stale-pr-message: >-
            This pull request has been waiting on author follow-up for 14 days.
            It will be closed in 7 more days if there is no update.
          close-pr-message: >-
            Closing this PR because requested author follow-up did not arrive in time.
            A smaller or refreshed follow-up PR is welcome.
