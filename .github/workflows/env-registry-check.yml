name: Env Registry Check

on:
  pull_request:
    paths:
      - 'addon/**'
      - 'scripts/check-env-registry.ts'
      - 'package.json'
  push:
    branches:
      - dev
      - main
    paths:
      - 'addon/**'
      - 'scripts/check-env-registry.ts'
      - 'package.json'

jobs:
  check-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Check env registry is in sync
        run: npm run check:env
