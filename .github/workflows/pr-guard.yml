name: PR Guard

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body and linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title || "";
            const changed = pr.changed_files || 0;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalChanges = additions + deletions;

            // Short-circuit for repo owners and trusted collaborators
            const isExempt = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(pr.author_association);
            if (isExempt) {
              console.log(`Bypassing PR Guard checks for trusted contributor (${pr.author_association}).`);
              return;
            }

            const docsOnly = /(^docs?[:/\-])|readme|documentation/i.test(title);
            const trivialTitle = /(typo|spelling|grammar|docs?)/i.test(title);
            const isLikelyTrivial = docsOnly || (changed <= 3 && totalChanges <= 40 && trivialTitle);

            const issueRegexes = [
              /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i,
              /#\d+/,
              /https:\/\/github\.com\/[\w.-]+\/[\w.-]+\/issues\/\d+/i,
              /[\w.-]+\/[\w.-]+#\d+/
            ];
            const hasIssueLink = issueRegexes.some((r) => r.test(body));

            const requiredPhrases = [
              '## summary',
              '## linked issue',
              '## type of change',
              '## why this approach',
              '## testing',
              '## documentation',
              '## author checklist',
              '## ai usage disclosure'
            ];
            const lowerBody = body.toLowerCase();
            const missingSections = requiredPhrases.filter((s) => !lowerBody.includes(s));

            const checkedBoxes = (body.match(/- \[x\]/gi) || []).length;

            const failures = [];

            if (missingSections.length) {
              failures.push(`Missing template sections: ${missingSections.join(', ')}`);
            }

            if (!isLikelyTrivial && !hasIssueLink) {
              failures.push('Non-trivial PRs must link an issue in the PR body.');
            }

            if (checkedBoxes < 5) {
              failures.push('Please complete the relevant checkboxes in the PR template.');
            }

            const authorChecklistSection = lowerBody.split('## author checklist')[1]?.split('##')[0] || '';
            const uncheckedAuthorBoxes = (authorChecklistSection.match(/- \[ \]/g) || []).length;
            
            if (uncheckedAuthorBoxes > 0) {
              failures.push('Please complete all items in the Author checklist.');
            }

            if (body.trim().length < 200) {
              failures.push('PR description is too short. Explain the problem, approach, and testing.');
            }

            if (changed > 25 || totalChanges > 1200) {
              failures.push('PR is too large for default review. Please split it into smaller, focused PRs.');
            }

            const labelsToAdd = [];
            if (!hasIssueLink && !isLikelyTrivial) labelsToAdd.push('needs-issue');
            if (changed > 25 || totalChanges > 1200) labelsToAdd.push('needs-split');
            if (pr.author_association === 'FIRST_TIME_CONTRIBUTOR' || pr.author_association === 'FIRST_TIMER') labelsToAdd.push('first-time-contributor');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            for (const name of labelsToAdd) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
              } catch (e) {}
            }

            const marker = '<!-- pr-guard-comment -->';
            const bodyMessage = `${marker}\n### PR Guard\n${failures.length ? failures.map(f => `- ${f}`).join('\n') : '- All automated intake checks passed.'}\n\nMaintainers may still close PRs that do not match project direction or review capacity.`;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: bodyMessage });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: bodyMessage });
            }

            if (failures.length) {
              core.setFailed(failures.join('\n'));
            }
