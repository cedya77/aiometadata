name: 💡 Feature Request
description: Suggest an idea, new provider, or enhancement for AIOMetadata.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas! Please keep in mind that we maintain this project in our free time, so we may not be able to implement everything.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. Are you proposing a new metadata provider, a frontend UI change, etc?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: checkboxes
    id: pr
    attributes:
      label: Would you be willing to submit a pull request?
      options:
        - label: Yes, I can help implement this!
