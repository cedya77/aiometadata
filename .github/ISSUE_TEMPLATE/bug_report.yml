name: 🐛 Bug Report
description: File a bug report for an unexpected problem with the addon or configure UI.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Before you submit, please make sure you have checked the existing issues to ensure it hasn't been reported already.
  - type: textarea
    id: description
    attributes:
      label: Description of the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I click...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running AIOMetadata?
      options:
        - Self-hosted (Docker)
        - Public hosted instance
        - Local Development
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Server Logs / Browser Console Errors
      description: Please paste any relevant logs from the Docker container or browser console.
      render: shell
